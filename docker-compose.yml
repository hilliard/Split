services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: split-db-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: split_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./00-init-user.sql:/docker-entrypoint-initdb.d/00-init-user.sql
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - split-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  split-network:
