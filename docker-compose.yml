version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: split-db-local
    environment:
      POSTGRES_USER: split_user
      POSTGRES_PASSWORD: split_password
      POSTGRES_DB: split_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - split-network

volumes:
  postgres_data:

networks:
  split-network:
